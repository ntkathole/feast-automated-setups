apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: feast-benchmark
  namespace: feast-benchmark
spec:
  runPolicy: Parallel
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: feast-benchmark:latest
  resources:
    limits:
      memory: 4Gi
      cpu: "2"
    requests:
      memory: 2Gi
      cpu: "1"
